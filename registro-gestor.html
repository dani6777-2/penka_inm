<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Gestor - PNK Inmobiliaria</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">
      <h2>PNK Inmobiliaria</h2>
    </div>
    <nav aria-label="Navegación principal">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="login.html">Iniciar Sesión</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="form-container">
      <h2>Registro de Gestor</h2>
      <form action="#" method="POST" enctype="multipart/form-data">
        <div class="grid grid--2-cols">
          <div class="form-group">
            <label for="rut">RUT</label>
            <input type="text" id="rut" name="rut" required placeholder="12.345.678-9">
          </div>
          <div class="form-group">
            <label for="nombre">Nombre Completo</label>
            <input type="text" id="nombre" name="nombre" required>
          </div>
        </div>

        <div class="grid grid--2-cols">
          <div class="form-group">
            <label for="fecha-nac">Fecha de Nacimiento</label>
            <input type="date" id="fecha-nac" name="fecha_nac" required>
          </div>
          <div class="form-group">
            <label for="sexo">Sexo</label>
            <select id="sexo" name="sexo" required>
              <option value="">Seleccione...</option>
              <option value="M">Masculino</option>
              <option value="F">Femenino</option>
              <option value="O">Otro</option>
            </select>
          </div>
        </div>

        <div class="grid grid--2-cols">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
          <label for="certificado">Certificado de Antecedentes</label>
          <input type="file" id="certificado" name="certificado" accept=".pdf,.png,.jpg" required>
        </div>

        <button type="submit" class="btn btn--accent" style="width: 100%; margin-top: 1rem;">Registrar Gestor</button>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 PNK Inmobiliaria. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
