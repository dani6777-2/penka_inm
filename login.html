<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - PNK Inmobiliaria</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">
      <h2>PNK Inmobiliaria</h2>
    </div>
    <nav aria-label="Navegación principal">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="registro-propietario.html">Registro</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="form-container" style="max-width: 400px; margin-top: 2rem;">
      <h2 style="text-align: center;">Iniciar Sesión</h2>
      <form action="dashboard.html" method="GET">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="btn" style="width: 100%; margin-bottom: 1rem;">Ingresar</button>
        
        <div style="text-align: center;">
          <a href="#" style="font-size: 0.9rem;">¿Olvidaste tu contraseña?</a>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 PNK Inmobiliaria. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
