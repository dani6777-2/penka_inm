<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Propiedades - PNK Inmobiliaria</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">
      <h2>PNK Inmobiliaria</h2>
    </div>
    <nav aria-label="Navegación superior">
      <ul>
        <li><a href="dashboard.html">Volver al Dashboard</a></li>
        <li><a href="index.html">Cerrar Sesión</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="dashboard-layout">
      <aside class="sidebar">
        <h3>Menú</h3>
        <nav aria-label="Navegación Dashboard">
          <ul style="list-style: none; display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem;">
            <li><a href="dashboard.html">Resumen</a></li>
            <li><a href="registro-propiedades.html" style="font-weight: bold; color: var(--primary-color);">Registro de Propiedades</a></li>
            <li><a href="gestion-usuarios.html">Gestión de Usuarios</a></li>
          </ul>
        </nav>
      </aside>

      <section class="dashboard-content">
        <div class="form-container" style="max-width: 100%;">
          <h2>Añadir o Editar Propiedad</h2>
          <form action="#" method="POST" enctype="multipart/form-data">
            
            <div class="grid grid--2-cols">
              <div class="form-group">
                <label for="tipo">Tipo de Propiedad</label>
                <select id="tipo" name="tipo" required>
                  <option value="">Seleccione...</option>
                  <option value="casa">Casa</option>
                  <option value="departamento">Departamento</option>
                  <option value="oficina">Oficina</option>
                  <option value="terreno">Terreno</option>
                </select>
              </div>
              <div class="form-group">
                <label for="fecha">Fecha de Publicación</label>
                <input type="date" id="fecha" name="fecha" required>
              </div>
            </div>

            <div class="form-group">
              <label for="descripcion">Descripción</label>
              <textarea id="descripcion" name="descripcion" rows="4" required></textarea>
            </div>

            <div class="grid grid--2-cols">
              <div class="form-group">
                <label for="banos">Baños</label>
                <input type="number" id="banos" name="banos" min="0" required>
              </div>
              <div class="form-group">
                <label for="dormitorios">Dormitorios</label>
                <input type="number" id="dormitorios" name="dormitorios" min="0" required>
              </div>
            </div>

            <div class="grid grid--2-cols">
              <div class="form-group">
                <label for="area-total">Área Total (m²)</label>
                <input type="number" id="area-total" name="area_total" step="0.01" required>
              </div>
              <div class="form-group">
                <label for="area-construida">Área Construida (m²)</label>
                <input type="number" id="area-construida" name="area_construida" step="0.01" required>
              </div>
            </div>

            <div class="grid grid--2-cols">
              <div class="form-group">
                <label for="moneda">Tipo de Moneda</label>
                <select id="moneda" name="moneda" required>
                  <option value="CLP">CLP</option>
                  <option value="UF">UF</option>
                </select>
              </div>
              <div class="form-group">
                <label for="precio">Precio</label>
                <input type="number" id="precio" name="precio" step="0.01" required>
              </div>
            </div>

            <fieldset style="border: none; margin-bottom: var(--spacing-md);">
              <legend style="margin-bottom: var(--spacing-sm); font-weight: 500;">Características Extra</legend>
              <div class="checkbox-container">
                <div class="checkbox-group">
                  <input type="checkbox" id="bodega" name="extras" value="bodega">
                  <label for="bodega" style="margin: 0; font-weight: normal;">Bodega</label>
                </div>
                <div class="checkbox-group">
                  <input type="checkbox" id="estacionamiento" name="extras" value="estacionamiento">
                  <label for="estacionamiento" style="margin: 0; font-weight: normal;">Estacionamiento</label>
                </div>
                <div class="checkbox-group">
                  <input type="checkbox" id="piscina" name="extras" value="piscina">
                  <label for="piscina" style="margin: 0; font-weight: normal;">Piscina</label>
                </div>
                <div class="checkbox-group">
                  <input type="checkbox" id="patio" name="extras" value="patio">
                  <label for="patio" style="margin: 0; font-weight: normal;">Patio</label>
                </div>
              </div>
            </fieldset>

            <div class="form-group">
              <label for="imagenes">Subida de Imágenes (Máx. 5)</label>
              <input type="file" id="imagenes" name="imagenes" accept="image/*" multiple required>
            </div>

            <button type="submit" class="btn btn--accent">Guardar Propiedad</button>
          </form>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 PNK Inmobiliaria. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
